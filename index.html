<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTE Forge</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
    
    <script crossorigin src="https://unpkg.com/recharts/umd/Recharts.min.js"></script>
    
    <script crossorigin src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-950 text-white">
    
    <div id="debug-console" style="color: #ff6b6b; font-family: monospace; padding: 10px; z-index: 9999; position: relative; font-weight: bold;"></div>
    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            document.getElementById('debug-console').innerText += "CRITICAL ERROR: " + message + " (Line: " + lineno + ")\n";
        };
    </script>

    <div id="root"></div>

    <script type="text/babel">
        // --- MAP LIBRARIES TO BROWSER GLOBALS ---
        const { useState, useEffect, useRef, useMemo } = React;
        
        // Safety check if Recharts failed to load
        if (!window.Recharts) {
            document.getElementById('debug-console').innerText += "ERROR: Recharts library failed to load from CDN.\n";
        }
        const { 
          LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, ReferenceLine, AreaChart, Area, ScatterChart, Scatter, ZAxis, ComposedChart, Label 
        } = window.Recharts || {};

        // FAIL-SAFE ICON WRAPPER
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                try {
                    if (iconRef.current && window.lucide && window.lucide.icons) {
                        // Attempt to find the icon by exact name or capitalized name
                        let iconData = window.lucide.icons[name] || 
                                       window.lucide.icons[name.charAt(0).toUpperCase() + name.slice(1)];
                        
                        if(iconData){
                            iconRef.current.innerHTML = '';
                            const svg = window.lucide.createElement(iconData);
                            svg.setAttribute('width', size);
                            svg.setAttribute('height', size);
                            svg.setAttribute('class', className);
                            iconRef.current.appendChild(svg);
                        } else {
                            console.warn("Icon not found in Lucide database:", name);
                        }
                    }
                } catch (e) {
                    console.error("Error creating icon:", name, e);
                }
            }, [name, size, className]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`} style={{ width: size, height: size }} />;
        };

        // --- MAP SPECIFIC ICONS TO COMPONENTS ---
        const Settings = (props) => <Icon name="Settings" {...props} />;
        const Target = (props) => <Icon name="Target" {...props} />;
        const Beaker = (props) => <Icon name="Beaker" {...props} />;
        const Zap = (props) => <Icon name="Zap" {...props} />;
        const AlertTriangle = (props) => <Icon name="AlertTriangle" {...props} />;
        const CheckCircle = (props) => <Icon name="CheckCircle" {...props} />;
        const Info = (props) => <Icon name="Info" {...props} />;
        const ChevronRight = (props) => <Icon name="ChevronRight" {...props} />;
        const Ruler = (props) => <Icon name="Ruler" {...props} />;
        const Thermometer = (props) => <Icon name="Thermometer" {...props} />;
        const Crosshair = (props) => <Icon name="Crosshair" {...props} />;
        const Save = (props) => <Icon name="Save" {...props} />;
        const RefreshCw = (props) => <Icon name="RefreshCw" {...props} />;
        const Layers = (props) => <Icon name="Layers" {...props} />;
        const Database = (props) => <Icon name="Database" {...props} />;
        const Disc = (props) => <Icon name="Disc" {...props} />;
        const Search = (props) => <Icon name="Search" {...props} />;
        const Globe = (props) => <Icon name="Globe" {...props} />;
        const Radio = (props) => <Icon name="Radio" {...props} />;
        const ShieldAlert = (props) => <Icon name="ShieldAlert" {...props} />;
        const Camera = (props) => <Icon name="Camera" {...props} />;
        const UploadCloud = (props) => <Icon name="UploadCloud" {...props} />;
        const ScanLine = (props) => <Icon name="ScanLine" {...props} />;
        const HelpCircle = (props) => <Icon name="HelpCircle" {...props} />;
        const Activity = (props) => <Icon name="Activity" {...props} />;
        const Lock = (props) => <Icon name="Lock" {...props} />;
        const Crown = (props) => <Icon name="Crown" {...props} />;
        const Cpu = (props) => <Icon name="Cpu" {...props} />;
        const MessageSquare = (props) => <Icon name="MessageSquare" {...props} />;
        const Sparkles = (props) => <Icon name="Sparkles" {...props} />;
        const Sliders = (props) => <Icon name="Sliders" {...props} />;
        const X = (props) => <Icon name="X" {...props} />;

        // ==========================================
        // ORIGINAL REACT CODE BEGINS HERE
        // ==========================================

        const R = 8.314; 
        const STEEL_SPEED_OF_SOUND = 234645;
        const apiKey = ""; 

        const MTE_FORGE_VERSION = "1.6.1-Pressure-Relief-Algorithm";

        const apiCache = {
          powder: {}, cartridge: {}, radar: {}, brass: {}
        };

        const safeFloat = (val, fallback) => {
          if (val === undefined || val === null) return fallback;
          const parsed = parseFloat(val);
          return isNaN(parsed) ? fallback : parsed;
        };

        const InputField = ({ label, value, onChange, unit, step = 0.1, type = "number", tooltip, icon: IconComponent }) => (
          <div className="flex flex-col gap-1.5">
            <label className="text-[10px] md:text-xs font-bold text-gray-400 uppercase tracking-widest flex items-center justify-between group relative cursor-help w-full">
              <span className="flex items-center gap-2">
                {IconComponent && <IconComponent size={14} className="text-orange-500/70" />}
                {label}
              </span>
              {tooltip && (
                <div className="flex items-center h-full pl-2 active:text-orange-500">
                  <HelpCircle size={14} className="text-gray-600 group-hover:text-orange-500 transition-colors" />
                  <div className="absolute bottom-full right-0 mb-2 w-64 p-3 bg-gray-900 border border-gray-700 rounded-xl shadow-2xl text-xs leading-relaxed text-gray-200 normal-case tracking-normal opacity-0 pointer-events-none group-hover:opacity-100 group-active:opacity-100 transition-opacity z-[70]">
                    {tooltip}
                  </div>
                </div>
              )}
            </label>
            <div className="relative">
              <input 
                type={type} 
                value={value === undefined || value === null ? '' : value} 
                step={step} 
                onChange={(e) => onChange(e.target.value)} 
                className="w-full bg-gray-900 border border-gray-700 rounded-lg py-2.5 px-3 text-white focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 font-mono text-sm md:text-base transition-all shadow-inner"
              />
              {unit && type === "number" && <span className="absolute right-3 top-3 text-gray-500 text-xs font-bold">{unit}</span>}
            </div>
          </div>
        );

        const AccordionSection = ({ title, icon: IconComponent, isExpanded, onToggle, children }) => (
          <div className={`rounded-xl border transition-all duration-200 overflow-visible ${isExpanded ? 'bg-gray-800/40 border-gray-700 shadow-lg' : 'bg-gray-900 border-gray-800/60 hover:bg-gray-800/30'}`}>
            <button 
              onClick={onToggle} 
              className="w-full p-4 flex items-center justify-between text-left transition-colors"
            >
              <div className="flex items-center gap-3">
                {IconComponent && <IconComponent size={16} className={isExpanded ? "text-orange-500" : "text-gray-500"} />}
                <span className={`text-xs font-black uppercase tracking-widest ${isExpanded ? "text-gray-100" : "text-gray-400"}`}>
                  {title}
                </span>
              </div>
              <ChevronRight size={16} className={`text-gray-500 transition-transform duration-200 ${isExpanded ? 'rotate-90' : ''}`} />
            </button>
            <div className={`transition-all duration-300 ease-in-out ${isExpanded ? 'max-h-[1500px] opacity-100' : 'max-h-0 opacity-0 overflow-hidden'}`}>
              <div className="p-4 pt-0 space-y-5 border-t border-gray-800/50 mt-1">
                {children}
              </div>
            </div>
          </div>
        );

        const App = () => {
          const [hasAcceptedDisclaimer, setHasAcceptedDisclaimer] = useState(false);
          const [hasDeclinedDisclaimer, setHasDeclinedDisclaimer] = useState(false);
          const [isProTier, setIsProTier] = useState(false); 
          const [activeTab, setActiveTab] = useState('simulation');
          const [isSimulating, setIsSimulating] = useState(false);
          const [isFetching, setIsFetching] = useState(false);
          const [results, setResults] = useState(null);
          const [apiLog, setApiLog] = useState("");
          const [radarData, setRadarData] = useState(null);
          const [radarError, setRadarError] = useState(null);

          const [isMobileSidebarOpen, setIsMobileSidebarOpen] = useState(false);

          const [expandedSections, setExpandedSections] = useState({
            api: true, mfgProfile: false, propellant: true, projectile: false, chamber: false, environment: false
          });

          const toggleSection = (section) => {
            setExpandedSections(prev => ({ ...prev, [section]: !prev[section] }));
          };

          const [bulletSearch, setBulletSearch] = useState("");
          const [powderSearch, setPowderSearch] = useState("");
          const [cartridgeSearch, setCartridgeSearch] = useState("");
          const [brassSearch, setBrassSearch] = useState("");

          const defaultInputs = {
            brassCaliber: '6 ARC', cartridgeType: 'Bottleneck', maxPressure: 62000, pressureStandard: 'SAAMI',
            bulletCaliber: 0.243, bulletWeight: 105, bulletName: 'Berger Hybrid Target', bulletLength: 1.260,
            bearingSurface: 0.505, bcG7: 0.268, bulletConstruction: 'Jacketed Lead Core',
            coal: 2.260, caseLength: 1.490, caseVolume: 34.0, barrelLength: 26.0, twistRate: 7.5,
            freebore: 0.120, throatAngle: 1.5, neckDiameter: 0.272, baseDiameter: 0.473, shoulderAngle: 30.0, headspace: 1.630,
            brassManufacturer: 'Starline', primerManufacturer: 'Federal', primerType: 'Small Rifle AR (205MAR)',
            powderManufacturer: 'Vihtavuori', powderName: 'N140', powderCharge: 28.0, powderType: 'Stick', 
            burnRateMod: 1.0, vivacityExponent: 0.45, heatOfExplosion: 3800, gamma: 1.25, powderDensity: 0.90, 
            tempSensitivity: 0.5, devTemp: 70, currentTemp: 70,
          };

          const [inputs, setInputs] = useState(() => {
            const savedInputs = localStorage.getItem('mte_forge_inputs');
            if (savedInputs) {
              try { return JSON.parse(savedInputs); } catch (e) { console.error(e); }
            }
            return defaultInputs;
          });

          const [isSaving, setIsSaving] = useState(false);

          const handleSaveBlueprint = () => {
            localStorage.setItem('mte_forge_inputs', JSON.stringify(inputs));
            setIsSaving(true);
            setTimeout(() => setIsSaving(false), 2000);
          };

          const [chronoVelocity, setChronoVelocity] = useState("");
          const [calibrationResult, setCalibrationResult] = useState(null);
          const [mfgLoadData, setMfgLoadData] = useState({ charge: "", velocity: "", pressure: "" });
          const [isProfiling, setIsProfiling] = useState(false);
          const [profilerResult, setProfilerResult] = useState(null);
          const [showFeedbackModal, setShowFeedbackModal] = useState(false);
          const [feedbackForm, setFeedbackForm] = useState({ actualVelocity: '', pressureSigns: 'None', notes: '', autoTrue: true });
          const [isSubmittingFeedback, setIsSubmittingFeedback] = useState(false);
          const [feedbackSubmitted, setFeedbackSubmitted] = useState(false);
          const [simView, setSimView] = useState('travel'); 
          const [targetImage, setTargetImage] = useState(null);
          const [targetFile, setTargetFile] = useState(null);
          const [isAnalyzing, setIsAnalyzing] = useState(false);
          const [targetResults, setTargetResults] = useState(null);
          const [isConsultingAI, setIsConsultingAI] = useState(false);
          const [aiGunsmithReport, setAiGunsmithReport] = useState(null);

          const getSanitizedInputs = () => {
            const parseNum = (val) => { const parsed = parseFloat(val); return isNaN(parsed) ? 0 : parsed; };
            const simInputs = { ...inputs };
            const numericFields = [
              'maxPressure', 'bulletCaliber', 'bulletWeight', 'bulletLength', 'bearingSurface', 'bcG7', 'coal', 'caseLength', 'caseVolume', 
              'barrelLength', 'twistRate', 'freebore', 'throatAngle', 'neckDiameter', 'baseDiameter', 'shoulderAngle', 'headspace', 'powderCharge', 
              'burnRateMod', 'vivacityExponent', 'heatOfExplosion', 'gamma', 'powderDensity', 'tempSensitivity', 'devTemp', 'currentTemp'
            ];
            numericFields.forEach(field => { simInputs[field] = parseNum(inputs[field]); });
            return simInputs;
          };

          const executeTruing = (targetMV) => {
            setIsSimulating(true);
            setTimeout(() => {
               const simInputs = getSanitizedInputs();
               let maxMod = 8.0, minMod = 0.1;
               let bestMod = simInputs.burnRateMod;
               let currentMV = 0;
               let lowMod = minMod, highMod = maxMod;
               for (let i = 0; i < 25; i++) {
                   let midMod = (lowMod + highMod) / 2;
                   let res = runPhysicsModel(simInputs, radarData, simInputs.powderCharge, midMod, false);
                   currentMV = res.vMax * 3.28084;
                   if (currentMV < targetMV) lowMod = midMod;
                   else highMod = midMod;
                   bestMod = midMod;
               }
               setInputs(prev => ({...prev, burnRateMod: parseFloat(bestMod.toFixed(4))}));
               setCalibrationResult(`Trued to ${Math.round(currentMV)} FPS`);
               setIsSimulating(false);
            }, 100);
          };

          const fetchPowderData = async (query) => {
            if (!query) return;
            if (apiCache.powder[query]) {
               const data = apiCache.powder[query];
               setInputs(prev => ({ ...prev, powderName: query, burnRateMod: safeFloat(data.burnRateMod, prev.burnRateMod), powderType: data.grainShape || prev.powderType, heatOfExplosion: safeFloat(data.heatOfExplosion, prev.heatOfExplosion), gamma: safeFloat(data.gamma, prev.gamma), powderDensity: safeFloat(data.bulkDensity, prev.powderDensity) }));
               setApiLog(`Loaded ${query} from cache.`);
               setExpandedSections(prev => ({...prev, api: false, mfgProfile: true, propellant: true}));
               return;
            }
            setIsFetching(true);
            setApiLog(`Connecting for ${query}...`);
            const systemPrompt = `Retrieve EXACT published physical properties for smokeless powder: "${query}". Return: { "found": true, "manufacturer_source": string, "burn_rate_mod": float, "grain_shape": "Stick"|"Ball"|"Multi-perf", "heat_of_explosion": float, "gamma": float, "bulk_density_g_cc": float }`;
            const fetchWithRetry = async (retries = 0) => {
              try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                  method: 'POST', headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ contents: [{ parts: [{ text: query }] }], systemInstruction: { parts: [{ text: systemPrompt }] }, generationConfig: { responseMimeType: "application/json" } })
                });
                const result = await response.json();
                const data = JSON.parse(result.candidates?.[0]?.content?.parts?.[0]?.text || "{}");
                if (data.found === false) { setApiLog(`Failed: "${query}" not found.`); return; }
                const parsedData = { burnRateMod: data.burn_rate_mod || data.burnRateMod, grainShape: data.grain_shape || data.grainShape, heatOfExplosion: data.heat_of_explosion || data.heatOfExplosion, gamma: data.gamma, bulkDensity: data.bulk_density_g_cc || data.bulkDensity };
                apiCache.powder[query] = parsedData; 
                setInputs(prev => ({ ...prev, powderName: query, burnRateMod: safeFloat(parsedData.burnRateMod, prev.burnRateMod), powderType: parsedData.grainShape || prev.powderType, heatOfExplosion: safeFloat(parsedData.heatOfExplosion, prev.heatOfExplosion), gamma: safeFloat(parsedData.gamma, prev.gamma), powderDensity: safeFloat(parsedData.bulkDensity, prev.powderDensity) }));
                setApiLog(`Success: Fetched ${query}.`);
                setExpandedSections(prev => ({...prev, api: false, mfgProfile: true, propellant: true}));
              } catch (err) {
                if (retries < 3) { await new Promise(r => setTimeout(r, Math.pow(2, retries) * 1000)); return fetchWithRetry(retries + 1); }
                setApiLog("API Timeout.");
              }
            };
            await fetchWithRetry();
            setIsFetching(false);
          };

          const fetchCartridgeData = async (query) => {
            if (!query) return;
            setIsFetching(true);
            setApiLog(`Querying standards for ${query}...`);
            const systemPrompt = `Return specs for ${query} in JSON: { "max_pressure_psi": integer, "standard": "SAAMI"|"CIP", "cartridge_type": "Bottleneck"|"Straight", "case_capacity_h2o": float, "case_length_inches": float, "coal_inches": float, "bullet_diameter_inches": float, "neck_diameter_inches": float, "base_diameter_inches": float, "shoulder_angle_degrees": float, "headspace_inches": float, "freebore_inches": float }`;
            const fetchWithRetry = async (retries = 0) => {
              try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                  method: 'POST', headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ contents: [{ parts: [{ text: query }] }], systemInstruction: { parts: [{ text: systemPrompt }] }, generationConfig: { responseMimeType: "application/json" } })
                });
                const result = await response.json();
                const data = JSON.parse(result.candidates?.[0]?.content?.parts?.[0]?.text || "{}");
                apiCache.cartridge[query] = data;
                setInputs(prev => ({ ...prev, brassCaliber: query, maxPressure: safeFloat(data.max_pressure_psi, prev.maxPressure), pressureStandard: data.standard || prev.pressureStandard, cartridgeType: data.cartridge_type || prev.cartridgeType, caseVolume: safeFloat(data.case_capacity_h2o, prev.caseVolume), caseLength: safeFloat(data.case_length_inches, prev.caseLength), coal: safeFloat(data.coal_inches, prev.coal), bulletCaliber: safeFloat(data.bullet_diameter_inches, prev.bulletCaliber), neckDiameter: safeFloat(data.neck_diameter_inches, prev.neckDiameter), baseDiameter: safeFloat(data.base_diameter_inches, prev.baseDiameter), shoulderAngle: safeFloat(data.shoulder_angle_degrees, prev.shoulderAngle), headspace: safeFloat(data.headspace_inches, prev.headspace), freebore: safeFloat(data.freebore_inches, prev.freebore) }));
                setApiLog(`Success: Loaded ${query}.`);
                setExpandedSections(prev => ({...prev, chamber: true}));
              } catch (err) {
                if (retries < 3) { await new Promise(r => setTimeout(r, Math.pow(2, retries) * 1000)); return fetchWithRetry(retries + 1); }
                setApiLog("API Timeout.");
              }
            };
            await fetchWithRetry();
            setIsFetching(false);
          };

          const fetchRadarData = async (bulletQuery) => {
            if (!bulletQuery) return;
            setIsFetching(true);
            setRadarError(null); 
            setApiLog(`Connecting for ${bulletQuery}...`);
            const systemPrompt = `Retrieve published specs for bullet: "${bulletQuery}". Return: { "found": true, "bc_g7": float, "drag_curve": [{ "mach": float, "cd": float }], "bearing_surface": float, "weight_grains": float, "caliber_inches": float, "length_inches": float }`;
            const fetchWithRetry = async (retries = 0) => {
              try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                  method: 'POST', headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ contents: [{ parts: [{ text: bulletQuery }] }], systemInstruction: { parts: [{ text: systemPrompt }] }, generationConfig: { responseMimeType: "application/json" } })
                });
                const result = await response.json();
                const data = JSON.parse(result.candidates?.[0]?.content?.parts?.[0]?.text || "{}");
                if (data.found === false || !data.drag_curve) { setRadarData(null); setApiLog(`Failed: not found.`); return; }
                data.drag_curve = data.drag_curve.map(pt => ({ mach: parseFloat(pt.mach), cd: parseFloat(pt.cd) }));
                setRadarData(data);
                setInputs(prev => ({ ...prev, bulletName: bulletQuery, bearingSurface: safeFloat(data.bearing_surface, prev.bearingSurface), bulletWeight: safeFloat(data.weight_grains, prev.bulletWeight), bulletCaliber: safeFloat(data.caliber_inches, prev.bulletCaliber), bulletLength: safeFloat(data.length_inches, prev.bulletLength), bcG7: safeFloat(data.bc_g7, prev.bcG7) }));
                setApiLog(`Bullet Loaded: ${bulletQuery}`);
                setExpandedSections(prev => ({...prev, projectile: true}));
              } catch (err) {
                if (retries < 3) { await new Promise(r => setTimeout(r, Math.pow(2, retries) * 1000)); return fetchWithRetry(retries + 1); }
                setApiLog("Database unreachable.");
              }
            };
            await fetchWithRetry();
            setIsFetching(false);
          };

          const fetchBrassData = async (query) => {
            if (!query) return;
            setIsFetching(true);
            setApiLog(`Connecting for ${query}...`);
            const systemPrompt = `Retrieve published properties for brass: "${query}". Return: { "found": true, "case_capacity_h2o": float, "case_length_inches": float }`;
            const fetchWithRetry = async (retries = 0) => {
              try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                  method: 'POST', headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ contents: [{ parts: [{ text: query }] }], systemInstruction: { parts: [{ text: systemPrompt }] }, generationConfig: { responseMimeType: "application/json" } })
                });
                const result = await response.json();
                const data = JSON.parse(result.candidates?.[0]?.content?.parts?.[0]?.text || "{}");
                if (data.found === false) { setApiLog(`Failed.`); return; }
                setInputs(prev => ({ ...prev, brassManufacturer: query.split(' ')[0], caseVolume: safeFloat(data.case_capacity_h2o, prev.caseVolume), caseLength: safeFloat(data.case_length_inches, prev.caseLength) }));
                setApiLog(`Loaded ${query}.`);
                setExpandedSections(prev => ({...prev, chamber: true}));
              } catch (err) {
                if (retries < 3) { await new Promise(r => setTimeout(r, Math.pow(2, retries) * 1000)); return fetchWithRetry(retries + 1); }
                setApiLog("API Timeout.");
              }
            };
            await fetchWithRetry();
            setIsFetching(false);
          };

          const generateAIGunsmithReport = async () => {
            if (!results) return;
            setIsConsultingAI(true);
            setAiGunsmithReport(null);
            setTimeout(() => {
                setAiGunsmithReport("Live API connection required to generate full AI Gunsmith report. Please ensure your Gemini Key is active.");
                setIsConsultingAI(false);
            }, 1000);
          };

          const analyzeTargetImage = async () => {
            if (!targetFile) return;
            setIsAnalyzing(true);
            setTimeout(() => {
                setTargetResults({ es: "0.82", mr: "0.31", poi: "U 0.1, R 0.2", diagnosis: "Live vision API required. This is a mock response." });
                setIsAnalyzing(false);
            }, 1500);
          };

          const runPhysicsModel = (simInputs, simRadarData, chargeGr, burnRateMod, generateHistory = false, customVivacity = null) => {
            const grToKg = 0.0000647989;
            const inToM = 0.0254;
            const bulletMass = simInputs.bulletWeight * grToKg;
            const boreArea = Math.pow((simInputs.bulletCaliber / 2) * inToM, 2) * Math.PI; 
            const weightingFactor = simInputs.cartridgeType === 'Straight' ? 0.33 : 0.5;
            const H2O_GRAIN_TO_M3 = 0.0000000647989; 

            const seatingDepthInches = Math.max(0, (simInputs.caseLength + simInputs.bulletLength) - simInputs.coal);
            const seatingDepthMeters = seatingDepthInches * inToM;
            const seatedVolumeM3 = seatingDepthMeters * boreArea;
            const baseChamberVolM3 = simInputs.caseVolume * H2O_GRAIN_TO_M3; 
            const usableChamberVolM3 = Math.max(0.0000001, baseChamberVolM3 - seatedVolumeM3);
            const barrelLenM = simInputs.barrelLength * inToM;
            const caliberFactor = Math.pow(simInputs.bulletCaliber / 0.243, 2);
            const powderVolumeH2O = chargeGr / (simInputs.powderDensity || 0.9);
            const usableChamberVolH2O = usableChamberVolM3 / H2O_GRAIN_TO_M3;
            const caseFillRatio = powderVolumeH2O / usableChamberVolH2O;

            const getShotStartForce = () => {
              let base = 400; 
              if (simInputs.bulletConstruction === 'Solid Copper') base = 1200; 
              if (simInputs.bulletConstruction === 'Banded Solid') base = 800;  
              return base * caliberFactor; 
            };
            const shotStartForce = getShotStartForce();

            const tempDelta = simInputs.currentTemp - simInputs.devTemp;
            const tempAdjustedBurnRate = burnRateMod * (1 + (tempDelta * simInputs.tempSensitivity * 0.0005));

            const powderMass = chargeGr * grToKg;
            const effectiveMass = bulletMass + (powderMass * weightingFactor);
            
            let state = { t: 0, v: 0, pos: 0.0001, burnedMass: 0, p: 0, vMax: 0, pMax: 0, pMaxPos: 0 };
            const dt = 0.000001; 
            const history = [];
            let stepCount = 0;

            state.burnedMass = Math.min(powderMass, 0.00003); 

            const getBurnIncrement = (currentP, currentBurned) => {
              if (currentBurned >= powderMass) return 0;
              let magnumSlowdown = Math.max(1.0, simInputs.caseVolume / 45.0);
              let baseTimeConst = 2400.0 * Math.pow(magnumSlowdown, 0.50); 
              let currentP_MPa = currentP / 1000000.0; 
              let safeP_MPa = Math.max(10.0, currentP_MPa); 
              let cappedP_MPa = Math.min(safeP_MPa, 200.0); 
              let pressureRatio = cappedP_MPa / 250.0; 
              let activeVivacity = customVivacity !== null ? customVivacity : (simInputs.vivacityExponent || 0.45);
              let pressureMod = Math.pow(pressureRatio, activeVivacity); 
              let compressionSpike = caseFillRatio > 1.0 ? Math.pow(caseFillRatio, 1.25) : 1.0;
              let burnTimeConst = (baseTimeConst / tempAdjustedBurnRate) / compressionSpike; 
              let z = currentBurned / powderMass; 
              let formFactor = simInputs.powderType === 'Ball' ? 1.0 - (0.3 * z) : simInputs.powderType === 'Multi-perf' ? 1.0 + (0.2 * z) : 1.0;
              let baseRate = powderMass / burnTimeConst;
              let cappedMod = Math.min(10.0, pressureMod * formFactor); 
              return baseRate * cappedMod * (dt * 1000000); 
            };

            while (state.pos < barrelLenM && stepCount < 35000) {
              stepCount++;
              let dw = getBurnIncrement(state.p, state.burnedMass);
              state.burnedMass = Math.min(powderMass, state.burnedMass + dw);
              let travelDist = Math.max(0, state.pos - 0.0001);
              let V_chamber = usableChamberVolM3 + (boreArea * travelDist);
              let solidPowderVol = (powderMass - state.burnedMass) / 1600; 
              let covolumeVol = state.burnedMass * 0.001; 
              let V_free = V_chamber - solidPowderVol - covolumeVol;
              V_free = Math.max(usableChamberVolM3 * 0.12, V_free);
              let energyReleased = state.burnedMass * (simInputs.heatOfExplosion * 1000); 
              let bulletKE = 0.5 * effectiveMass * state.v * state.v;
              let heatLoss = energyReleased * 0.03; 
              let thermalEnergy = Math.max(0, energyReleased - bulletKE - heatLoss);
              let gammaMinus1 = (simInputs.gamma || 1.25) - 1.0;
              state.p = (gammaMinus1 * thermalEnergy) / V_free;
              let isEngraving = state.pos <= 0.0105; 
              let bearingSurfaceDrag = (simInputs.bearingSurface / 0.450) * 10 * caliberFactor; 
              let effectiveBC = (isProTier && simRadarData) ? simRadarData.bc_g7 : simInputs.bcG7;
              let dynamicFriction = (15 * caliberFactor) * (1 + (0.5 - (effectiveBC||0.26))) + bearingSurfaceDrag; 
              let currentResistance = isEngraving ? shotStartForce : dynamicFriction;
              let force = (state.p * boreArea) - currentResistance; 
              state.v += (force / effectiveMass) * dt; 
              if (state.v < 0) state.v = 0; 
              state.pos += state.v * dt;
              state.t += dt;
              if (state.p > state.pMax) { state.pMax = state.p; state.pMaxPos = state.pos; }
              if (state.v > state.vMax) state.vMax = state.v;
              
              if (generateHistory && stepCount % 20 === 0) { 
                history.push({ time: (state.t * 1000).toFixed(3), travel: parseFloat((travelDist / inToM).toFixed(2)), pressure: Math.round(state.p / 6894.76), velocity: Math.round(state.v * 3.28084), burnPercent: Math.min(100, ((state.burnedMass / powderMass) * 100)).toFixed(1) });
              }
            }

            let exactExitTime = state.t;
            if (state.v > 0 && state.pos > barrelLenM) {
                let overshootMeters = state.pos - barrelLenM;
                let timeOvershoot = overshootMeters / state.v;
                exactExitTime = Math.max(0.0001, state.t - timeOvershoot);
            }
            if (generateHistory) {
                history.push({ time: (exactExitTime * 1000).toFixed(3), travel: parseFloat((barrelLenM / inToM).toFixed(2)), pressure: Math.round(state.pExit / 6894.76), velocity: Math.round(state.vMax * 3.28084), burnPercent: Math.min(100, ((state.burnedMass / powderMass) * 100)).toFixed(1) });
            }
            return { pMax: state.pMax, pMaxPos: state.pMaxPos, vMax: state.vMax, t: exactExitTime, pExit: state.p, history, burnPercent: Math.min(100, ((state.burnedMass / powderMass) * 100)).toFixed(1) };
          };

          const runSimulation = () => {
            try {
              const simInputs = getSanitizedInputs();
              const powderChargeGr = simInputs.powderCharge;
              if (powderChargeGr === 0 || simInputs.bulletWeight === 0 || simInputs.barrelLength === 0) {
                  setIsSimulating(false); return;
              }

              const mainRes = runPhysicsModel(simInputs, radarData, powderChargeGr, simInputs.burnRateMod, true);
              const baselineTimeMs = mainRes.t * 1000;
              const peakPsi = mainRes.pMax / 6894.76;

              const inToM = 0.0254;
              const H2O_GRAIN_TO_M3 = 0.0000000647989; 
              const boreArea = Math.pow((simInputs.bulletCaliber / 2) * inToM, 2) * Math.PI; 
              const seatingDepthInches = Math.max(0, (simInputs.caseLength + simInputs.bulletLength) - simInputs.coal);
              const seatingDepthMeters = seatingDepthInches * inToM;
              const seatedVolumeM3 = seatingDepthMeters * boreArea;
              const baseChamberVolM3 = simInputs.caseVolume * H2O_GRAIN_TO_M3; 
              const usableChamberVolM3 = Math.max(0.0000001, baseChamberVolM3 - seatedVolumeM3);
              const usableChamberVolH2O = usableChamberVolM3 / H2O_GRAIN_TO_M3;

              const heatFactor = simInputs.heatOfExplosion / 3800; 
              const powderVolumeH2O = powderChargeGr / simInputs.powderDensity;
              const caseFillPercent = (powderVolumeH2O / usableChamberVolH2O) * 100;
              const boreAreaSqIn = Math.pow(simInputs.bulletCaliber / 2, 2) * Math.PI;
              const overboreRatio = powderChargeGr / boreAreaSqIn;
              const overboreFactor = Math.pow(600 / overboreRatio, 1.7);
              const pressureFactor = Math.pow(60000 / Math.max(peakPsi, 30000), 1.2);
              const estimatedBarrelLife = Math.round(5000 * overboreFactor * pressureFactor * heatFactor);

              let allNodes = [], displayNodes = [], harmonicWaveData = [], closestNodeObj = null, nodeQuality = null;

              if (isProTier) {
                  const baseNodes24 = [ { id: 1, time: 0.9421 }, { id: 2, time: 1.0113 }, { id: 3, time: 1.0853 }, { id: 4, time: 1.1645 }, { id: 5, time: 1.2491 }, { id: 6, time: 1.3395 }, { id: 7, time: 1.4363 }, { id: 8, time: 1.5401 }, { id: 9, time: 1.6514 }, { id: 10, time: 1.7709 }, { id: 11, time: 1.8996 }, { id: 12, time: 2.0384 }, { id: 13, time: 2.1880 }, { id: 14, time: 2.3490 }, { id: 15, time: 2.5220 }, { id: 16, time: 2.7070 }, { id: 17, time: 2.9050 }, { id: 18, time: 3.1160 }, { id: 19, time: 3.3400 }, { id: 20, time: 3.5780 } ];
                  allNodes = baseNodes24.map(node => {
                      const targetNodeTime = node.time * (simInputs.barrelLength / 24);
                      let lowCharge = targetNodeTime > baselineTimeMs ? 0.5 : powderChargeGr;
                      let highCharge = targetNodeTime > baselineTimeMs ? powderChargeGr : Math.max(powderChargeGr * 2.0, simInputs.caseVolume * 2.0); 

                      let bestCharge = powderChargeGr;
                      for (let searchStep = 0; searchStep < 18; searchStep++) {
                          let midCharge = (lowCharge + highCharge) / 2;
                          let simRes = runPhysicsModel(simInputs, radarData, midCharge, simInputs.burnRateMod, false);
                          if ((simRes.t * 1000) > targetNodeTime) lowCharge = midCharge; 
                          else highCharge = midCharge;
                          bestCharge = midCharge;
                      }

                      let verifySim = runPhysicsModel(simInputs, radarData, bestCharge, simInputs.burnRateMod, false);
                      let timeDiff = Math.abs((verifySim.t * 1000) - targetNodeTime);
                      let psi = verifySim.pMax / 6894.76;
                      
                      let requiredChargeStr = timeDiff < 0.15 ? `${bestCharge.toFixed(1)}gr` : "UNREACHABLE";
                      return { id: node.id, time: targetNodeTime, requiredCharge: timeDiff < 0.15 ? bestCharge : null, requiredChargeStr, isOverPressure: timeDiff < 0.15 && psi > simInputs.maxPressure, isSquib: timeDiff < 0.15 && psi < 30000, psi };
                  });
                  
                  const exitTimeMs = mainRes.t * 1000;
                  closestNodeObj = allNodes.reduce((prev, curr) => Math.abs(curr.time - exitTimeMs) < Math.abs(prev.time - exitTimeMs) ? curr : prev);
                  const closestIdx = allNodes.findIndex(n => n.id === closestNodeObj.id);
                  nodeQuality = Math.abs(exitTimeMs - closestNodeObj.time) < 0.015 ? 'Gold' : 'Suboptimal';

                  let startIndex = Math.max(0, closestIdx - 2);
                  let endIndex = startIndex + 4;
                  if (endIndex >= allNodes.length) { endIndex = allNodes.length - 1; startIndex = Math.max(0, endIndex - 4); }
                  displayNodes = allNodes.slice(startIndex, endIndex + 1);

                  if (displayNodes.length > 0) {
                      const minTime = displayNodes[0].time - 0.2;
                      const maxTime = displayNodes[displayNodes.length - 1].time + 0.2;
                      for (let t = minTime; t <= maxTime; t += 0.005) {
                         let closestDist = 999;
                         for (let n of displayNodes) { let dist = Math.abs(t - n.time); if (dist < closestDist) closestDist = dist; }
                         harmonicWaveData.push({ time: parseFloat(t.toFixed(3)), stress: Math.min(1, closestDist * 15) });
                      }
                  }
              }

              const ladderData = [];
              for (let step = -12; step <= 0; step++) {
                 let testCharge = powderChargeGr + (step * 0.3);
                 let res = runPhysicsModel(simInputs, radarData, testCharge, simInputs.burnRateMod, false);
                 ladderData.push({ charge: `${testCharge.toFixed(1)}`, pressure: Math.round(res.pMax / 6894.76), velocity: Math.round(res.vMax * 3.28084), burnPercent: parseFloat(res.burnPercent) });
              }

              setResults({
                muzzleVelocity: Math.round(mainRes.vMax * 3.28084),
                peakPressure: Math.round(mainRes.pMax / 6894.76),
                muzzlePressure: Math.round(mainRes.pExit / 6894.76),
                peakPressurePos: (mainRes.pMaxPos / inToM).toFixed(2),
                barrelTime: (mainRes.t * 1000).toFixed(4),
                nodeQuality, closestNode: closestNodeObj?.time.toFixed(4), closestNodeId: closestNodeObj?.id,
                obtNodes: allNodes, displayNodes, harmonicWaveData,
                caseFill: caseFillPercent, usableCaseVol: usableChamberVolH2O, barrelLife: estimatedBarrelLife,
                history: mainRes.history, ladderData, burnPercent: mainRes.burnPercent
              });
              setIsSimulating(false);
            } catch (err) {
              console.error("Simulation failed", err);
              document.getElementById('debug-console').innerText += "SIMULATION ERROR: " + err.message + "\n";
              setIsSimulating(false);
            }
          };

          useEffect(() => { 
            setIsSimulating(true);
            const timeoutId = setTimeout(() => { runSimulation(); }, 400); 
            return () => clearTimeout(timeoutId);
          }, [inputs, radarData, isProTier]);

          const pressureState = useMemo(() => {
            const p = results?.peakPressure;
            const max = inputs.maxPressure;
            if (!p) return { color: "text-white", text: "" };
            if (p > max) return { color: "text-red-500", text: `WARNING: EXCEEDS ${inputs.pressureStandard}` };
            if (p >= max * 0.95) return { color: "text-amber-500", text: `HIGH: APPROACHING ${inputs.pressureStandard} MAX` };
            if (p <= 30000) return { color: "text-yellow-500", text: "LOW: SQUIB RISK" };
            return { color: "text-emerald-500", text: "SAFE: WITHIN LIMITS" };
          }, [results?.peakPressure, inputs.maxPressure, inputs.pressureStandard]);

          const isProTab = ['harmonics', 'chamber', 'target ai'].includes(activeTab);

          if (hasDeclinedDisclaimer) {
            return (
              <div className="min-h-screen bg-gray-950 flex flex-col items-center justify-center p-4 text-center selection:bg-orange-500/30">
                <ShieldAlert size={64} className="text-red-500 mb-6" />
                <h1 className="text-3xl font-black uppercase tracking-widest text-white mb-4">Access Denied</h1>
                <p className="text-gray-400 font-mono max-w-md mb-8">You must accept the legal disclaimer and safety warnings to use the MTE Machining Forge simulator.</p>
                <button onClick={() => setHasDeclinedDisclaimer(false)} className="bg-gray-800 border border-gray-700 hover:bg-gray-700 text-white px-8 py-3 rounded-xl font-bold uppercase tracking-widest transition-all">Review Disclaimer</button>
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-gray-950 text-gray-100 font-sans selection:bg-orange-500/30 pb-24 lg:pb-20 relative">
              
              {/* Header */}
              <header className="border-b border-gray-800 bg-gray-900/80 backdrop-blur-xl sticky top-0 z-40 px-4 py-3 flex items-center justify-between">
                <div className="flex items-center gap-3">
                  <div className="w-9 h-9 md:w-11 md:h-11 bg-gradient-to-br from-orange-500 to-orange-700 rounded-xl flex items-center justify-center shadow-lg"><Zap size={20} className="text-white" /></div>
                  <div className="flex flex-col">
                     <h1 className="text-lg md:text-xl font-bold tracking-tight flex items-center gap-2">
                        MTE <span className="text-orange-400">FORGE</span>
                        <button 
                          onClick={() => setIsProTier(!isProTier)} 
                          className={`text-[9px] px-2 py-0.5 rounded font-black tracking-widest transition-all ${isProTier ? 'bg-orange-500 text-black shadow-[0_0_10px_rgba(245,158,11,0.5)]' : 'bg-gray-800 text-gray-400 hover:bg-gray-700'}`}
                        >
                          {isProTier ? 'PRO' : 'BASIC'}
                        </button>
                     </h1>
                     <p className="text-[10px] text-gray-500 uppercase font-mono tracking-widest hidden sm:block">Internal Ballistics Suite v{MTE_FORGE_VERSION}</p>
                  </div>
                </div>
                <div className="flex gap-2">
                   <button 
                     onClick={() => setIsMobileSidebarOpen(true)}
                     className="lg:hidden bg-orange-600/10 border border-orange-500/30 text-orange-500 hover:bg-orange-600 hover:text-white px-3 py-2 rounded-xl flex items-center justify-center transition-all shadow-sm active:scale-95"
                   >
                     <Sliders size={18} />
                   </button>
                   <button 
                     onClick={handleSaveBlueprint} 
                     className={`border px-4 py-2 rounded-xl font-bold flex items-center gap-2 transition-all text-xs uppercase ${isSaving ? 'bg-emerald-500/10 text-emerald-500 border-emerald-500/30' : 'bg-gray-800 hover:bg-gray-700 border-gray-700 text-white shadow-sm'}`}
                   >
                     {isSaving ? <CheckCircle size={16} /> : <Save size={16} />} 
                     <span className="hidden sm:inline">{isSaving ? "Saved" : "Save"}</span>
                   </button>
                </div>
              </header>

              <main className="max-w-[1500px] mx-auto p-3 md:p-6 grid grid-cols-1 lg:grid-cols-12 gap-4 md:gap-8">
                
                <aside className={`fixed inset-y-0 left-0 z-50 w-[85%] max-w-[360px] bg-gray-950 border-r border-gray-800 p-4 md:p-5 overflow-y-auto transform transition-transform duration-300 shadow-2xl lg:static lg:w-full lg:max-w-none lg:border-none lg:p-0 lg:bg-transparent lg:shadow-none lg:col-span-3 lg:translate-x-0 ${isMobileSidebarOpen ? 'translate-x-0' : '-translate-x-full'} space-y-3 lg:sticky lg:top-[5.5rem] lg:h-[calc(100vh-7rem)] hide-scrollbar pb-24 lg:pb-10`}>
                  <div className="bg-gray-900/50 border border-gray-800 rounded-2xl p-4 md:p-5 shadow-xl space-y-3">
                    <h2 className="hidden lg:flex items-center gap-2 text-gray-300 font-black uppercase text-xs tracking-widest border-b border-gray-800 pb-3 mb-4">
                      <Settings size={16} className="text-orange-500" /> Component Blueprint
                    </h2>

                    <AccordionSection title="Cloud Database Search" icon={Globe} isExpanded={expandedSections.api} onToggle={() => toggleSection('api')}>
                      <div className="grid grid-cols-1 gap-2">
                        <div className="flex gap-1.5">
                          <input type="text" placeholder="Powder (e.g. Varget)..." className="flex-1 bg-gray-950 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white focus:border-orange-500 focus:outline-none" value={powderSearch} onChange={(e) => setPowderSearch(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && fetchPowderData(powderSearch)} />
                          <button onClick={() => fetchPowderData(powderSearch)} className="bg-gray-800 text-orange-400 px-3 rounded-lg border border-gray-700"><Search size={16}/></button>
                        </div>
                      </div>
                      {apiLog && (<div className={`mt-3 text-[10px] font-mono p-3 rounded-lg border leading-relaxed ${isFetching ? 'bg-orange-500/10 text-orange-400 border-orange-500/30 animate-pulse' : 'bg-gray-950/80 text-gray-400 border-gray-800 shadow-inner'}`}>{apiLog}</div>)}
                    </AccordionSection>

                    <AccordionSection title="Propellant & Charge" icon={Zap} isExpanded={expandedSections.propellant} onToggle={() => toggleSection('propellant')}>
                      <div className="grid grid-cols-2 gap-3">
                        <div className="col-span-2">
                           <InputField label="Charge Weight" icon={Zap} unit="gr" step={0.1} value={inputs.powderCharge} onChange={(v) => setInputs({...inputs, powderCharge: v})} />
                        </div>
                        <div className="col-span-2 grid grid-cols-2 gap-3 p-4 bg-gray-950/50 rounded-xl border border-gray-800 shadow-inner">
                           <InputField label="Heat (kJ/kg)" value={inputs.heatOfExplosion} step={10} onChange={(v) => setInputs({...inputs, heatOfExplosion: v})} />
                           <InputField label="Bulk Dens (g/cc)" value={inputs.powderDensity} step={0.01} onChange={(v) => setInputs({...inputs, powderDensity: v})} />
                        </div>
                      </div>
                    </AccordionSection>

                    <AccordionSection title="Projectile Profile" icon={Target} isExpanded={expandedSections.projectile} onToggle={() => toggleSection('projectile')}>
                      <div className="grid grid-cols-2 gap-3">
                        <InputField label="Weight (gr)" value={inputs.bulletWeight} onChange={(v) => setInputs({...inputs, bulletWeight: v})} />
                        <InputField label="Caliber (in)" step={0.001} value={inputs.bulletCaliber} onChange={(v) => setInputs({...inputs, bulletCaliber: v})} />
                        <InputField label="Length (in)" step={0.001} value={inputs.bulletLength} onChange={(v) => setInputs({...inputs, bulletLength: v})} />
                        <InputField label="Bearing (in)" step={0.001} value={inputs.bearingSurface} onChange={(v) => setInputs({...inputs, bearingSurface: v})} />
                      </div>
                    </AccordionSection>

                    <AccordionSection title="Chamber & Brass" icon={Disc} isExpanded={expandedSections.chamber} onToggle={() => toggleSection('chamber')}>
                      <div className="grid grid-cols-2 gap-3">
                        <InputField label="H2O Vol (gr)" value={inputs.caseVolume} onChange={(v) => setInputs({...inputs, caseVolume: v})} />
                        <InputField label="Max PSI" value={inputs.maxPressure} step={1000} onChange={(v) => setInputs({...inputs, maxPressure: v})} />
                        <InputField label="Case Len (in)" step={0.001} value={inputs.caseLength} onChange={(v) => setInputs({...inputs, caseLength: v})} />
                        <InputField label="COAL (in)" step={0.001} value={inputs.coal} onChange={(v) => setInputs({...inputs, coal: v})} />
                        <div className="col-span-2 border-t border-gray-800 mt-4 pt-4 grid grid-cols-2 gap-3">
                           <InputField label="Barrel (in)" value={inputs.barrelLength} onChange={(v) => setInputs({...inputs, barrelLength: v})} />
                           <InputField label="Twist (1:x)" value={inputs.twistRate} step={0.5} onChange={(v) => setInputs({...inputs, twistRate: v})} />
                        </div>
                      </div>
                    </AccordionSection>
                  </div>
                </aside>

                <div className="lg:col-span-9 space-y-5 md:space-y-8">
                  <div className={`transition-all duration-300 ${isSimulating ? 'opacity-50 blur-[2px] pointer-events-none scale-[0.995]' : 'opacity-100 blur-0 scale-100'}`}>
                    
                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-5 mb-6 md:mb-8">
                      <div className="bg-gradient-to-br from-gray-900 to-gray-950 border border-gray-800 p-5 md:p-6 rounded-3xl shadow-xl relative overflow-hidden">
                        <p className="text-gray-400 text-[10px] md:text-xs font-black uppercase tracking-widest mb-2">Muzzle Velocity</p>
                        <div className="flex items-baseline gap-1.5 md:gap-2"><span className="text-4xl md:text-5xl font-black text-white">{results?.muzzleVelocity || '---'}</span><span className="text-orange-400 text-[10px] md:text-xs font-bold">FPS</span></div>
                      </div>
                      
                      <div className="bg-gradient-to-br from-gray-900 to-gray-950 border border-gray-800 p-5 md:p-6 rounded-3xl shadow-xl relative overflow-hidden">
                        <p className="text-gray-400 text-[10px] md:text-xs font-black uppercase tracking-widest mb-2">Peak Pressure</p>
                        <div className="flex flex-col">
                          <div className="flex items-baseline gap-1.5 md:gap-2"><span className={`text-4xl md:text-5xl font-black tracking-tight ${pressureState.color}`}>{results?.peakPressure?.toLocaleString() || '---'}</span><span className="text-gray-500 text-[10px] md:text-xs font-bold">PSI</span></div>
                        </div>
                      </div>

                      <div className="bg-gradient-to-br from-gray-900 to-gray-950 border border-gray-800 p-5 md:p-6 rounded-3xl shadow-xl relative overflow-hidden hidden sm:block">
                        <p className="text-gray-400 text-[10px] md:text-xs font-black uppercase tracking-widest mb-2">Barrel Life</p>
                        <div className="flex items-baseline gap-1.5 md:gap-2"><span className="text-4xl md:text-5xl font-black font-mono tracking-tight text-emerald-500">{results?.barrelLife?.toLocaleString() || '---'}</span></div>
                      </div>

                      <div className="bg-gradient-to-br from-gray-900 to-gray-950 border border-gray-800 p-5 md:p-6 rounded-3xl shadow-xl relative overflow-hidden hidden sm:block">
                        <p className="text-gray-400 text-[10px] md:text-xs font-black uppercase tracking-widest mb-2">OBT Harmonics</p>
                        <div className="flex flex-col">
                           {isProTier ? (
                             <div className="text-lg md:text-2xl font-black uppercase text-amber-400">{results?.nodeQuality || 'Calculating...'}</div>
                           ) : (
                             <div className="text-lg md:text-2xl font-black uppercase text-gray-600">PRO TIER</div>
                           )}
                        </div>
                      </div>
                    </div>

                    <div className="flex border-b border-gray-800 overflow-x-auto hide-scrollbar mb-5 md:mb-8">
                      {['simulation', 'harmonics', 'chamber', 'target ai'].map((tab) => (
                        <button key={tab} onClick={() => setActiveTab(tab)} className={`px-5 md:px-8 py-3.5 md:py-4 text-[10px] md:text-xs font-black uppercase tracking-widest border-b-2 transition-all whitespace-nowrap flex items-center gap-2 ${activeTab === tab ? 'border-orange-500 text-orange-400 bg-orange-500/5' : 'border-transparent text-gray-500'}`}>
                          {tab}
                        </button>
                      ))}
                    </div>

                    <div className="bg-gray-900 border border-gray-800 rounded-3xl p-4 md:p-8 min-h-[500px] shadow-2xl relative">
                        {activeTab === 'simulation' && (
                          <div className="space-y-6 md:space-y-8">
                            <div className="h-[300px] md:h-[400px] w-full -ml-3 md:ml-0">
                                {window.Recharts ? (
                                  <ResponsiveContainer width="100%" height="100%">
                                    <ComposedChart data={results?.history} margin={{ top: 10, right: 10, left: 0, bottom: 0 }}>
                                      <CartesianGrid strokeDasharray="3 3" stroke="#1f2937" vertical={false} />
                                      <XAxis dataKey="travel" type="number" domain={['dataMin', 'dataMax']} stroke="#6b7280" tick={{fontSize: 10}} tickCount={8} />
                                      <YAxis yAxisId="pressureAxis" stroke="#f97316" tick={{fontSize: 10}} width={60} />
                                      <YAxis yAxisId="velocityAxis" orientation="right" stroke="#3b82f6" tick={{fontSize: 10}} width={60} />
                                      <Tooltip contentStyle={{ backgroundColor: '#0a0a0a', border: '1px solid #1f2937', borderRadius: '12px' }} />
                                      <Area yAxisId="pressureAxis" type="monotone" dataKey="pressure" stroke="#f97316" strokeWidth={2.5} fill="#f97316" fillOpacity={0.1} />
                                      <Line yAxisId="velocityAxis" type="monotone" dataKey="velocity" stroke="#3b82f6" strokeWidth={2.5} dot={false} />
                                    </ComposedChart>
                                  </ResponsiveContainer>
                                ) : (
                                  <div className="flex items-center justify-center h-full text-red-500 font-mono">Charting engine failed to load.</div>
                                )}
                            </div>
                          </div>
                        )}
                        {isProTab && !isProTier && (
                          <div className="flex flex-col items-center justify-center h-full min-h-[300px] text-center">
                              <h3 className="text-2xl font-black uppercase text-gray-400">Upgrade to Pro</h3>
                          </div>
                        )}
                    </div>
                  </div>
                </div>
              </main>
            </div>
          );
        };

        // --- ERROR BOUNDARY ---
        class ErrorBoundary extends React.Component {
          constructor(props) { super(props); this.state = { hasError: false, error: null }; }
          static getDerivedStateFromError(error) { return { hasError: true, error }; }
          componentDidCatch(error, errorInfo) { document.getElementById('debug-console').innerText += "REACT CRASH: " + error.toString() + "\n"; }
          render() {
            if (this.state.hasError) return <div style={{padding: '20px', color: '#ff6b6b'}}><h1>Application Halted</h1><pre>{this.state.error.toString()}</pre></div>;
            return this.props.children; 
          }
        }

        // ==========================================
        // ORIGINAL REACT CODE ENDS HERE
        // ==========================================

        try {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<ErrorBoundary><App /></ErrorBoundary>);
        } catch (e) {
            document.getElementById('debug-console').innerText += "INITIALIZATION ERROR: " + e.message + "\n";
        }
    </script>
</body>
</html>
